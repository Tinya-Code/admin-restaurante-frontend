<section class=" justify-end ">
  <!-- Vista desktop: listado de categorías como chips -->
  <div
    class="hidden sm:flex items-center justify-start gap-3 flex-wrap rounded-sm bg-white/70 backdrop-blur border border-gray-200 px-4 py-3 "
  >
    <button
      (click)="add('all')"
      [class.bg-[#42b0cc]]="CategorySelect() === 'all'"
      class="px-4 py-2 rounded-sm text-sm font-medium text-gray-700 hover:bg-indigo-100 hover:text-indigo-700 transition whitespace-nowrap"
    >
      Todos
    </button>

    <!-- Chips dinámicos por categoría -->
    @for (item of categories(); track item.id) {
      <button
        (click)="add(item.id)"
        [ngClass]="{
          'bg-[#42b0cc] text-white': CategorySelect() === item.id,
          'bg-gray-100 text-gray-700': CategorySelect() !== item.id,
        }"
        class="px-4 py-2 rounded-sm text-sm font-medium hover:bg-indigo-200 hover:text-indigo-700 transition whitespace-nowrap"
      >
        {{ item.name }}
      </button>
    }
  </div>

  <!-- Vista mobile: selector desplegable de categorías -->
  <div class="sm:hidden flex justify-end">
    <div class="relative ">
      <select
        (change)="add(categorySelect.value)"
        #categorySelect
        class="w-full appearance-none rounded-sm border border-gray-300 bg-white py-2.5 pl-4 pr-10 text-sm text-gray-700 shadow-sm focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
      >
        <!-- Opción placeholder -->
        <option disabled selected>Categorías</option>

        <!-- Opción: mostrar todos -->
        <option value="all">Todos</option>

        <!-- Opciones dinámicas por categoría -->
        @for (item of categories(); track item.id) {
          <option [value]="item.id">{{ item.name }}</option>
        }
      </select>

      <!-- Ícono decorativo de despliegue -->
      <span class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">
        ▼
      </span>
    </div>
  </div>
</section>
